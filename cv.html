        </p>

        <!--
          DROPBOX LINK INSTRUCTIONS:
          1. Upload your CV PDF to Dropbox.
          2. Click "Share" → "Copy link". You'll get something like:
             https://www.dropbox.com/s/xxxx/CV_YourName.pdf?dl=0
          3. Change the ?dl=0 at the end to ?raw=1
             (this forces the browser to open the PDF directly)
          4. Paste that link into the href below.
        -->
        <a
          class="cv-download-btn"
          href="YOUR_DROPBOX_LINK_HERE"
          target="_blank"
          rel="noopener"
        >
          Download CV (PDF)
